name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore RailwayHelper.sln

      - name: Build
        run: dotnet build RailwayHelper.sln -c Release --no-restore

      - name: Test
        run: dotnet test RailwayHelper.sln -c Release --no-build --verbosity normal

      - name: Pack
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet pack src/RailwayHelper/RailwayHelper.csproj -c Release --no-build -o ./artifacts

      - name: Push to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
